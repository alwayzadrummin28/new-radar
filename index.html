<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tactical Ops Dashboard</title>
<style>
    body {
        margin: 0;
        background: #05060a;
        font-family: 'Orbitron', sans-serif;
        color: #00eaff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .dashboard {
        width: 95vw;
        height: 95vh;
        display: grid;
        grid-template-rows: 1.2fr 1fr 1fr;
        gap: 14px;
    }

    /* TOP — LIVE RADAR */
    .radar {
        background: #0d0f16;
        border: 2px solid #00eaff;
        box-shadow: 0 0 30px #00eaff66;
        border-radius: 6px;
    }

    /* MIDDLE ROW */
    .middle-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 14px;
    }

    .panel {
        background: #0d0f16;
        border: 2px solid #00ff88;
        box-shadow: 0 0 25px #00ff8866;
        border-radius: 6px;
        position: relative;
        overflow: hidden;
    }

    .panel-title {
        position: absolute;
        top: 8px;
        left: 12px;
        font-size: 0.9rem;
        letter-spacing: 2px;
        color: #00ff88;
        opacity: 0.9;
        z-index: 10;
    }

    /* BOTTOM ROW */
    .bottom-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 14px;
    }

    .blank {
        background: #0d0f16;
        border: 2px solid #ff0099;
        box-shadow: 0 0 25px #ff009966;
        border-radius: 6px;
    }
</style>
</head>
<body>

<div class="dashboard">

    <!-- TOP: LIVE RADAR -->
    <div class="radar"></div>

    <!-- MIDDLE ROW -->
    <div class="middle-row">

        <!-- LEFT PANEL — FIRE SPREAD -->
        <div class="panel">
            <div class="panel-title">FIRE SPREAD</div>

            <iframe 
                width="100%" 
                height="100%" 
                src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=in&metricTemp=°F&metricWind=mph&zoom=5&overlay=fwi&product=fireDanger&level=surface&lat=37.666&lon=-92.483&detailLat=37.9051994823157&detailLon=-90.84869384765625&marker=true"
                frameborder="0"
                style="border: none; margin-top: 28px;"
            ></iframe>
        </div>

        <!-- CENTER PANEL (blank for now) -->
        <div class="panel"></div>

        <!-- RIGHT PANEL — FUEL MOISTURE -->
        <div class="panel">
            <div class="panel-title">FUEL MOISTURE</div>

            <iframe 
                width="100%" 
                height="100%" 
                src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=in&metricTemp=°F&metricWind=mph&zoom=5&overlay=dfm10h&product=fireDanger&level=surface&lat=37.666&lon=-92.483&detailLat=37.9051994823157&detailLon=-90.84869384765625&marker=true"
                frameborder="0"
                style="border: none; margin-top: 28px;"
            ></iframe>
        </div>

    </div>

    <!-- BOTTOM ROW -->
    <div class="bottom-row">
        <div class="blank"></div>
        <div class="blank"></div>
        <div class="blank"></div>
    </div>

</div>

</body>
</html>
