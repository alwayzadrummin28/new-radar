<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tactical Ops Dashboard</title>
<style>
    body {
        margin: 0;
        background: #0a0a0f;
        font-family: 'Orbitron', sans-serif;
        color: #00eaff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .dashboard {
        width: 95vw;
        height: 95vh;
        display: grid;
        grid-template-rows: 1.2fr 1fr 1fr;
        gap: 12px;
    }

    /* TOP — LIVE RADAR */
    .radar {
        background: #11131a;
        border: 2px solid #00eaff;
        box-shadow: 0 0 25px #00eaff55;
        border-radius: 6px;
    }

    /* MIDDLE ROW */
    .middle-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
    }

    .panel {
        background: #11131a;
        border: 2px solid #00ff88;
        box-shadow: 0 0 20px #00ff8855;
        border-radius: 6px;
        position: relative;
    }

    .panel-title {
        position: absolute;
        top: 6px;
        left: 10px;
        font-size: 0.9rem;
        letter-spacing: 2px;
        color: #00ff88;
        opacity: 0.85;
    }

    /* BOTTOM ROW */
    .bottom-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
    }

    .blank {
        background: #11131a;
        border: 2px solid #ff0099;
        box-shadow: 0 0 20px #ff009955;
        border-radius: 6px;
    }
</style>
</head>
<body>

<div class="dashboard">

    <!-- TOP: LIVE RADAR -->
    <div class="radar"></div>

    <!-- MIDDLE ROW -->
    <div class="middle-row">
        <div class="panel">
            <div class="panel-title">FIRE SPREAD</div>
        </div>

        <div class="panel">
            <!-- intentionally blank -->
        </div>

        <div class="panel">
            <div class="panel-title">FUEL MOISTURE</div>
        </div>
    </div>

    <!-- BOTTOM ROW -->
    <div class="bottom-row">
        <div class="blank"></div>
        <div class="blank"></div>
        <div class="blank"></div>
    </div>

</div>

</body>
</html>
