<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tactical Ops Dashboard</title>
<style>
    body {
        margin: 0;
        background: #05060a;
        font-family: 'Orbitron', sans-serif;
        color: #00eaff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .dashboard {
        width: 95vw;
        height: 95vh;
        display: grid;
        grid-template-rows: 1.2fr 1fr 1fr;
        gap: 14px;
    }

    /* TOP — LIVE RADAR */
    .radar {
        background: #0d0f16;
        border: 2px solid #00eaff;
        box-shadow: 0 0 30px #00eaff66;
        border-radius: 6px;
        position: relative;
        overflow: hidden;
    }

    .radar-title {
        position: absolute;
        top: 8px;
        left: 12px;
        font-size: 0.9rem;
        letter-spacing: 2px;
        color: #00eaff;
        opacity: 0.9;
        z-index: 10;
    }

    /* MIDDLE ROW */
    .middle-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 14px;
    }

    .panel {
        background: #0d0f16;
        border: 2px solid #00ff88;
        box-shadow: 0 0 25px #00ff8866;
        border-radius: 6px;
        position: relative;
        overflow: hidden;
    }

    .panel-title {
        position: absolute;
        top: 8px;
        left: 12px;
        font-size: 0.9rem;
        letter-spacing: 2px;
        color: #00ff88;
        opacity: 0.9;
        z-index: 10;
    }

    /* BOTTOM ROW */
    .bottom-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 14px;
    }

    .blank {
        background: #0d0f16;
        border: 2px solid #ff0099;
        box-shadow: 0 0 25px #ff009966;
        border-radius: 6px;
        position: relative;
        overflow: hidden;
    }

    .bottom-title {
        position: absolute;
        top: 8px;
        left: 12px;
        font-size: 0.9rem;
        letter-spacing: 2px;
        color: #ff0099;
        opacity: 0.9;
        z-index: 10;
    }

    /* Logo styling */
    .logo-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
        background: radial-gradient(circle at center, #000 60%, #001a33 100%);
    }

    .logo-container img {
        max-width: 80%;
        height: auto;
        filter: drop-shadow(0 0 25px #00eaff);
    }
</style>
</head>
<body>

<div class="dashboard">

    <!-- TOP: LIVE RADAR -->
    <div class="radar">
        <div class="radar-title">LIVE RADAR</div>
        <iframe 
            src="https://www.rainviewer.com/map.html?loc=37.545,-92.8649,5&oC=true&oCS=1&oF=1&oAP=1&c=9&o=83&lm=1&layer=radar&sm=1&sn=1&ts=2"
            width="100%"
            height="100%"
            frameborder="0"
            style="border:0; margin-top: 28px;"
            allowfullscreen>
        </iframe>
    </div>

    <!-- MIDDLE ROW -->
    <div class="middle-row">

        <!-- LEFT PANEL — FIRE SPREAD -->
        <div class="panel">
            <div class="panel-title">FIRE SPREAD</div>
            <iframe 
                width="100%" 
                height="100%" 
                src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=in&metricTemp=°F&metricWind=mph&zoom=5&overlay=fwi&product=fireDanger&level=surface&lat=37.666&lon=-92.483"
                frameborder="0"
                style="border: none; margin-top: 28px;">
            </iframe>
        </div>

        <!-- CENTER PANEL — CLOUD COVERAGE -->
        <div class="panel">
            <div class="panel-title">CLOUD COVERAGE</div>
            <iframe 
                width="100%" 
                height="100%" 
                src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=in&metricTemp=°F&metricWind=mph&zoom=5&overlay=satellite&product=satellite&level=surface&lat=37.666&lon=-92.483"
                frameborder="0"
                style="border: none; margin-top: 28px;">
            </iframe>
        </div>

        <!-- RIGHT PANEL — FUEL MOISTURE -->
        <div class="panel">
            <div class="panel-title">FUEL MOISTURE</div>
            <iframe 
                width="100%" 
                height="100%" 
                src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=in&metricTemp=°F&metricWind=mph&zoom=5&overlay=dfm10h&product=fireDanger&level=surface&lat=37.666&lon=-92.483"
                frameborder="0"
                style="border: none; margin-top: 28px;">
            </iframe>
        </div>

    </div>

    <!-- BOTTOM ROW -->
    <div class="bottom-row">

        <!-- LEFT BOTTOM — WIND -->
        <div class="blank">
            <div class="bottom-title">WIND</div>
            <iframe 
                width="100%" 
                height="100%" 
                src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=in&metricTemp=°F&metricWind=mph&zoom=5&overlay=wind&product=ecmwf&level=surface&lat=37.527&lon=-91.736"
                frameborder="0"
                style="border: none; margin-top: 28px;">
            </iframe>
        </div>

        <!-- MIDDLE BOTTOM — FORECAST -->
        <div class="blank">
            <div class="bottom-title">FORECAST</div>
            <a class="weatherwidget-io" 
               href="https://forecast7.com/en/37d94n90d79/potosi/?unit=us" 
               data-label_1="POTOSI" 
               data-label_2="WEATHER" 
               data-font="Verdana" 
               data-icons="Climacons Animated" 
               data-theme="original">
               POTOSI WEATHER
            </a>
        </div>

        <!-- RIGHT BOTTOM — LOGO TILE -->
        <div class="blank">
            <div class="logo-container">
                <img src="https://i.imgur.com/0z0xQpP.jpeg" alt="Potosi Fire Ops Center Logo">
            </div>
        </div>

    </div>

</div>

<!-- WEATHER WIDGET SCRIPT -->
<script>
!function(d,s,id){
    var js,fjs=d.getElementsByTagName(s)[0];
    if(!d.getElementById(id)){
        js=d.createElement(s);
        js.id=id;
        js.src='https://weatherwidget.io/js/widget.min.js';
        fjs.parentNode.insertBefore(js,fjs);
    }
}(document,'script','weatherwidget-io-js');
</script>

</body>
</html>
