<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire Ops Dashboard</title>

<style>
    body {
        margin: 0;
        background: #0a0a0f;
        font-family: 'Segoe UI', sans-serif;
        color: #e0e0e0;
    }

    /* GRID LAYOUT */
    .grid {
        display: grid;
        grid-template-rows: 260px 200px 200px;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding: 12px;
    }

    /* TOP BAR (Radar) spans all 3 columns */
    .top-bar {
        grid-column: 1 / 4;
        background: #11131a;
        border: 2px solid #00eaff;
        border-radius: 10px;
        box-shadow: 0 0 25px #00eaff88;
        padding: 10px;
    }

    /* Middle + Bottom tiles */
    .tile {
        background: #11131a;
        border: 2px solid #ff009d;
        border-radius: 10px;
        box-shadow: 0 0 20px #ff009d66;
        padding: 10px;
    }

    /* Headers inside tiles */
    .tile h2 {
        margin-top: 0;
        color: #00eaff;
        text-shadow: 0 0 10px #00eaff;
        font-size: 1.2rem;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 8px;
    }
</style>
</head>

<body>

<div class="grid">

    <!-- TOP BAR — RADAR -->
    <div class="top-bar">
        <h2>Live Radar</h2>
        <iframe src="YOUR_RADAR_IFRAME_HERE"></iframe>
    </div>

    <!-- MIDDLE 3 TILES -->
    <div class="tile">
        <h2>Fuel Load</h2>
        <iframe src="YOUR_IFRAME_OR_DATA_WIDGET"></iframe>
    </div>

    <div class="tile">
        <h2>Moisture</h2>
        <iframe src="YOUR_IFRAME_OR_DATA_WIDGET"></iframe>
    </div>

    <div class="tile">
        <h2>Wind / Spread</h2>
        <iframe src="YOUR_IFRAME_OR_DATA_WIDGET"></iframe>
    </div>

    <!-- BOTTOM 3 TILES -->
    <div class="tile">
        <h2>ABC Index</h2>
        <iframe src="YOUR_IFRAME_OR_DATA_WIDGET"></iframe>
    </div>

    <div class="tile">
        <h2>Fire Danger</h2>
        <iframe src="YOUR_IFRAME_OR_DATA_WIDGET"></iframe>
    </div>

    <div class="tile">
        <h2>Other Metrics</h2>
        <iframe src="YOUR_IFRAME_OR_DATA_WIDGET"></iframe>
    </div>

</div>

</body>
</html>
